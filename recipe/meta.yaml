{% set version = "1.79.0" %}
{% set bz_version = "8.6.0" %}
{% set bz_base_url = "https://github.com/bazelbuild/bazel/releases/download" %}

package:
  name: grpc_java_plugin
  version: {{ version }}

source:
  - url: https://github.com/grpc/grpc-java/archive/refs/tags/v{{ version }}.tar.gz
    sha256: ca53210ee823a15d9b1ebe86a36b564d6834fd0c049e207469803180b7f8a20e
    patches:
      - patches/0001-Build-against-system-libprotobuf.patch

  - fn: bazel
    url: {{ bz_base_url }}/{{ bz_version }}/bazel_nojdk-{{ bz_version }}-linux-x86_64  # [build_platform == "linux-64"]
    sha256: 218ce0aed544d29084f4d9ff98f01bc784b90fe4c79dab63fa990dc  # [build_platform == "linux-64"]
    url: {{ bz_base_url }}/{{ bz_version }}/bazel_nojdk-{{ bz_version }}-darwin-x86_64  # [build_platform == "osx-64"]
    sha256: ccc67fa48a6444818a5b85e8174c89ca2630df60c1e2327714d9440  # [build_platform == "osx-64"]
    url: {{ bz_base_url }}/{{ bz_version }}/bazel_nojdk-{{ bz_version }}-darwin-arm64  # [build_platform == "osx-arm64"]
    sha256: 61776a387f2ea2a515eb92bc1c520b6af6451148216244058f6ee2b4c012cd89  # [build_platform == "osx-arm64"]

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - openjdk
    - openjdk 21  # [linux]
    - bazel-toolchain
    - libprotobuf
    - sed  # [osx]
  host:
    - libabseil
    - libprotobuf
    - protobuf-bazel-rules

test:
  commands:
    - test -f $PREFIX/bin/grpc_java_plugin

about:
  home: https://github.com/grpc/grpc-java/tree/master/compiler
  license: Apache-2.0
  license_family: MIT
  license_file: LICENSE
  summary: gRPC Java Codegen Plugin for Protobuf Compiler

extra:
  recipe-maintainers:
    - xhochy
    - conda-forge/bazel
    - conda-forge/grpc-cpp
